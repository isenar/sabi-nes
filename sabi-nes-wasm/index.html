<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>sabi-nes</title>
  <style>
    body {
      background: #1a1a1a;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-family: sans-serif;
      margin: 0;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    button {
      padding: 6px 14px;
      cursor: pointer;
    }
    canvas {
      image-rendering: pixelated;
      width: 512px;
      height: 480px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>Load ROM: <input type="file" id="rom-picker" accept=".nes"></label>
    <button id="fullscreen-btn">Fullscreen</button>
    <span id="fps" style="font-size:0.85em;color:#aaa;min-width:4ch"></span>
  </div>
  <canvas id="nes-canvas" width="256" height="240"></canvas>

  <script type="module">
    import init, { WasmEmulator } from './pkg/sabi_nes_wasm.js';

    await init();
    const emulator = new WasmEmulator('nes-canvas');
    let rafId = null;

    // key code → WasmEmulator numeric code (must match key_code_to_button in Rust)
    const KEY_MAP = {
      'KeyX':       0, // A
      'KeyZ':       1, // B
      'ShiftLeft':  2, // Select
      'ShiftRight': 2, // Select
      'Enter':      3, // Start
      'ArrowUp':    4,
      'ArrowDown':  5,
      'ArrowLeft':  6,
      'ArrowRight': 7,
    };

    document.getElementById('rom-picker').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const data = new Uint8Array(await file.arrayBuffer());
      try {
        emulator.load_rom(data);
      } catch (err) {
        alert(`Failed to load ROM: ${err}`);
        return;
      }
      if (rafId !== null) cancelAnimationFrame(rafId);
      const FRAME_MS = 1000 / 60;
      const fpsEl = document.getElementById('fps');
      let lastTime = null;
      let fpsCount = 0, fpsWindowStart = null;
      function loop(timestamp) {
        if (lastTime === null || timestamp - lastTime >= FRAME_MS - 1) {
          lastTime = timestamp;
          try {
            emulator.step_frame();
          } catch (err) {
            rafId = null;
            console.error('Emulator error:', err);
            return;
          }
          fpsCount++;
          if (fpsWindowStart === null) fpsWindowStart = timestamp;
          const elapsed = timestamp - fpsWindowStart;
          if (elapsed >= 500) {
            fpsEl.textContent = `${Math.round(fpsCount * 1000 / elapsed)} FPS`;
            fpsCount = 0;
            fpsWindowStart = timestamp;
          }
        }
        rafId = requestAnimationFrame(loop);
      }
      rafId = requestAnimationFrame(loop);
    });

    document.addEventListener('keydown', (e) => {
      const key = KEY_MAP[e.code];
      if (key !== undefined) {
        e.preventDefault();
        emulator.key_down(key);
      }
    });

    document.addEventListener('keyup', (e) => {
      const key = KEY_MAP[e.code];
      if (key !== undefined) emulator.key_up(key);
    });

    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      document.getElementById('nes-canvas').requestFullscreen().catch(err => {
        console.warn('Fullscreen failed:', err);
      });
    });
  </script>
</body>
</html>
