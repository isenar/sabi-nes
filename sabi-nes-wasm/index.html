<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>sabi-nes</title>
  <style>
    body {
      background: #1a1a1a;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-family: sans-serif;
      margin: 0;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    button {
      padding: 6px 14px;
      cursor: pointer;
    }
    canvas {
      image-rendering: pixelated;
      width: 512px;
      height: 480px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>Load ROM: <input type="file" id="rom-picker" accept=".nes"></label>
    <button id="fullscreen-btn">Fullscreen</button>
    <span id="fps" style="font-size:0.85em;color:#aaa;min-width:4ch"></span>
  </div>
  <canvas id="nes-canvas" width="256" height="240"></canvas>

  <script type="module" src="./main.ts"></script>
</body>
</html>
